<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定投记录本-精准版</title>
    <style>
        :root { --bg: #ffffff; --text: #333333; --border: #eeeeee; --accent: #000000; --danger: #ff4d4f; }
        body { font-family: -apple-system, system-ui, sans-serif; max-width: 850px; margin: 0 auto; padding: 20px; color: var(--text); }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .filter-tag { padding: 4px 12px; border: 1px solid var(--border); cursor: pointer; font-size: 12px; }
        .filter-tag.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; padding: 20px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .stat-item span { display: block; font-size: 11px; color: #888; }
        .stat-item strong { font-size: 20px; font-weight: 600; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; color: #888; font-weight: normal; border-bottom: 1px solid var(--border); padding: 10px 5px; }
        td { padding: 12px 5px; border-bottom: 1px solid var(--border); }

        .actions { white-space: nowrap; text-align: right; }
        .btn-text { background: none; border: none; color: #0066cc; cursor: pointer; font-size: 12px; margin-left: 10px; }
        .btn-delete { color: var(--danger); }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.98); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { width: 320px; padding: 25px; border: 1px solid var(--border); background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; margin-bottom: 5px; color: #999; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); box-sizing: border-box; outline: none; }

        .btn-main { background: var(--accent); color: #fff; border: none; padding: 12px; cursor: pointer; width: 100%; font-weight: 600; }
        .btn-add-trigger { position: fixed; bottom: 30px; right: 30px; width: 56px; height: 56px; border-radius: 28px; background: var(--accent); color: #fff; border: none; font-size: 28px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-secondary { background: transparent; border: none; color: #999; font-size: 12px; cursor: pointer; margin-top: 15px; width: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 12px; color: #999;">定投记录（移动平均成本法）</div>
    </div>

    <div class="filter-bar" id="filter-bar"></div>

    <section class="stats">
        <div class="stat-item">
            <span>当前持仓市值成本</span>
            <strong id="total-cost">0.00</strong>
        </div>
        <div class="stat-item">
            <span>持有份额</span>
            <strong id="total-shares">0.0000</strong>
        </div>
        <div class="stat-item">
            <span>平均持仓成本</span>
            <strong id="avg-cost">0.00</strong>
        </div>
    </section>

    <table>
        <thead>
            <tr>
                <th>日期</th>
                <th>类型</th>
                <th>标的</th>
                <th>金额</th>
                <th>价格</th>
                <th>份额</th>
                <th class="actions">操作</th>
            </tr>
        </thead>
        <tbody id="record-list"></tbody>
    </table>

    <button class="btn-add-trigger" onclick="openModal()">+</button>

    <div id="modal">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-top:0; font-weight: 400;">新增记录</h3>
            <input type="hidden" id="edit-index">
            <div class="form-group"><label>日期</label><input type="date" id="date"></div>
            <div class="form-group"><label>类型</label><select id="type"><option value="buy">买入</option><option value="sell">卖出</option></select></div>
            <div class="form-group"><label>标的</label><input type="text" id="asset" placeholder="如 BTC"></div>
            <div class="form-group"><label>投入金额</label><input type="number" id="amount" step="any" oninput="calcShares()"></div>
            <div class="form-group"><label>价格</label><input type="number" id="price" step="any" oninput="calcShares()"></div>
            <div class="form-group"><label>份额</label><input type="number" id="shares" step="any"></div>
            <button class="btn-main" onclick="saveRecord()">确认保存</button>
            <button class="btn-secondary" onclick="closeModal()">取消</button>
        </div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('invest_records_v4') || '[]');
        let currentFilter = '全部';

        function openModal(index = -1) {
            const modal = document.getElementById('modal');
            modal.style.display = 'flex';
            document.getElementById('edit-index').value = index;

            if (index > -1) {
                const r = records[index];
                document.getElementById('modal-title').innerText = "编辑记录";
                document.getElementById('date').value = r.date;
                document.getElementById('type').value = r.type;
                document.getElementById('asset').value = r.asset;
                document.getElementById('amount').value = r.amount;
                document.getElementById('price').value = r.price;
                document.getElementById('shares').value = r.shares;
            } else {
                document.getElementById('modal-title').innerText = "新增记录";
                document.getElementById('date').valueAsDate = new Date();
                ['asset', 'amount', 'price', 'shares'].forEach(id => document.getElementById(id).value = '');
            }
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function calcShares() {
            const a = document.getElementById('amount').value;
            const p = document.getElementById('price').value;
            if (a && p > 0) document.getElementById('shares').value = (a / p).toFixed(6);
        }

        function saveRecord() {
            const idx = parseInt(document.getElementById('edit-index').value);
            const data = {
                date: document.getElementById('date').value,
                type: document.getElementById('type').value,
                asset: document.getElementById('asset').value.toUpperCase().trim(),
                amount: parseFloat(document.getElementById('amount').value),
                price: parseFloat(document.getElementById('price').value),
                shares: parseFloat(document.getElementById('shares').value)
            };
            if (!data.asset || isNaN(data.amount)) return;

            if (idx > -1) records[idx] = data;
            else records.push(data);

            localStorage.setItem('invest_records_v4', JSON.stringify(records));
            render();
            closeModal();
        }

        function deleteRecord(index) {
            if (confirm('确定删除这条记录吗？')) {
                records.splice(index, 1);
                localStorage.setItem('invest_records_v4', JSON.stringify(records));
                render();
            }
        }

        function render() {
            const tbody = document.getElementById('record-list');
            const assets = ['全部', ...new Set(records.map(r => r.asset))];
            document.getElementById('filter-bar').innerHTML = assets.map(a =>
                `<div class="filter-tag ${currentFilter === a ? 'active' : ''}" onclick="setFilter('${a}')">${a}</div>`
            ).join('');

            tbody.innerHTML = '';
            let filtered = records.map((r, i) => ({...r, originalIndex: i}))
                                  .filter(r => currentFilter === '全部' || r.asset === currentFilter)
                                  .sort((a, b) => new Date(a.date) - new Date(b.date)); // 必须按时间正序算成本

            let runningShares = 0;
            let runningCostPrice = 0;

            filtered.forEach(r => {
                const isBuy = r.type === 'buy';

                // 核心算法：移动平均成本
                if (isBuy) {
                    const totalCostBefore = runningShares * runningCostPrice;
                    runningShares += r.shares;
                    runningCostPrice = (totalCostBefore + r.amount) / runningShares;
                } else {
                    runningShares -= r.shares;
                    // 卖出不改变剩余持仓的单位成本
                }

                // 为了显示，渲染到表格（倒序排列显示）
                const row = `<tr>
                    <td>${r.date}</td>
                    <td style="color:${isBuy?'#333':'#999'}">${isBuy?'买入':'卖出'}</td>
                    <td>${r.asset}</td>
                    <td>${r.amount.toFixed(2)}</td>
                    <td>${r.price.toLocaleString()}</td>
                    <td>${(isBuy?1:-1 * r.shares).toFixed(4)}</td>
                    <td class="actions">
                        <button class="btn-text" onclick="openModal(${r.originalIndex})">编辑</button>
                        <button class="btn-text btn-delete" onclick="deleteRecord(${r.originalIndex})">删除</button>
                    </td>
                </tr>`;
                tbody.insertAdjacentHTML('afterbegin', row);
            });

            // 更新顶部统计
            document.getElementById('total-shares').innerText = runningShares.toFixed(4);
            document.getElementById('avg-cost').innerText = runningCostPrice.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('total-cost').innerText = (runningShares * runningCostPrice).toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function setFilter(asset) { currentFilter = asset; render(); }

        render();
    </script>
</body>
</html>
